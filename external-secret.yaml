apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secret-store
    kind: SecretStore
  target:
    name: db-secret
  data:
    - secretKey: DB_USER
      remoteRef:
        key: my-db-secret
        property: username
    - secretKey: DB_PASS
      remoteRef:
        key: my-db-secret
        property: password
