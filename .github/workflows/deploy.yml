name: Deploy to EKS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region $AWS_REGION \
        | docker login --username AWS --password-stdin ${{ secrets.ECR_REPOSITORY }}

    - name: Build Image
      run: docker build -t my-app .

    - name: Tag Image
      env:
        IMAGE_TAG=${{ github.sha }}
      run: 
        docker tag my-app:latest ${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG
      

    - name: Push Image
      run: docker push ${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG

    - name: Configure kubectl
      run: |
        aws eks update-kubeconfig \
        --region $AWS_REGION \
        --name ${{ secrets.EKS_CLUSTER_NAME }}

    - name: Deploy to EKS
      run: |
        sed -i "s|IMAGE_PLACEHOLDER|${{ secrets.ECR_REPOSITORY }}:latest|g" deployment.yml
        kubectl apply -f deployment.yml
        kubectl apply -f service.yml
